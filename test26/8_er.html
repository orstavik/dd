<script type="module">
  import "../src/dd.js";

  const jsonData = {
    "author/1": { name: "Orson Scott Card", birthYear: 1951 },
    "author/2": { name: "Frank Herbert", birthYear: 1920 },
    "book/1": { title: "Ender's Game", authors: ["author/1"] },
    "book/2": { title: "Dune", authors: ["author/2"] },
    "book/3": { title: "Collab Book", authors: ["author/1", "author/2"] }
  };

  document.portals.define("get-data", { reaction: NAME => () => jsonData });
  document.portals.define("spa", {

  });
  document.portals.define("main", { reaction: NAME => ({ er, path }) => ({ ...er[path] }) });

</script>
